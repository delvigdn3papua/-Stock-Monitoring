                if (d && uniqueDepos.indexOf(d) === -1) uniqueDepos.push(d);
            });
            uniqueDepos.sort();
            uniqueDepos.forEach(function(d) {
                var escaped = escapeJsString(d);
                container.innerHTML +=
                    `<span class="chip" data-depo="${escaped}" onclick="filterChip(this, '${escaped}')">${safeAttr(d)}</span>`;
            });
        }

        // ============================================================
        // APPLY ALL FILTERS
        // ============================================================
        function applyAllFilters() {
            var chipDepo = selectedChip || '';

            filteredData = [];
            rawData.forEach(function(row) {
                var matchDepo = !chipDepo || row.depo === chipDepo;
                var matchSearch = !searchQuery || row.customer.toLowerCase().includes(searchQuery);
                if (matchDepo && matchSearch) {
                    filteredData.push(row);
                }
            });

            renderCustomerCards(filteredData);
            updateKPIFromData(filteredData);
            updateWorstWos(filteredData);
            document.getElementById('kpiItemCount').innerText = filteredData.length;
        }

        // ============================================================
        // BUSINESS KEY - STABLE IDENTIFIER
        // ============================================================
        function generateBusinessKey(record) {
            if (!record) return '';

            var imei = extractIMEI(record);
            if (imei) {
                return 'IMEI|' + imei.toString().trim().toUpperCase();
            }

            if (record.barang && Array.isArray(record.barang)) {
                for (var i = 0; i < record.barang.length; i++) {
                    var barang = record.barang[i];
                    if (barang && barang.details && Array.isArray(barang.details)) {
                        for (var j = 0; j < barang.details.length; j++) {
                            var detail = barang.details[j];
                            if (detail) {
                                var detailImei = detail.imei || detail.serial || '';
                                if (detailImei) {
                                    return 'IMEI|' + detailImei.toString().trim().toUpperCase();
                                }
                            }
                        }
                    }
                }
            }

            if (record._id && record._id.toString().trim() !== '') {
                return 'ID|' + record._id.toString().trim();
            }
            if (record.recordId && record.recordId.toString().trim() !== '') {
                return 'ID|' + record.recordId.toString().trim();
            }
            if (record.id && record.id.toString().trim() !== '') {
                return 'ID|' + record.id.toString().trim();
            }

            var depo = record.depo || '';
            var customer = record.customer || '';
            var sku = getSKUName(record) || '';

            var parts = [
                depo.toString().trim().toUpperCase(),
                customer.toString().trim().toUpperCase(),
                sku.toString().trim().toUpperCase()
            ];
            parts = parts.filter(function(p) { return p !== ''; });

            if (parts.length >= 2) {
                return 'COMBO|' + parts.join('|');
            }

            return '';
        }

        function extractIMEI(record) {
            if (!record) return '';
            if (record.imei) return record.imei;
            if (record.serial) return record.serial;
            if (record.barang && Array.isArray(record.barang)) {
                for (var i = 0; i < record.barang.length; i++) {
                    var barang = record.barang[i];
                    if (barang && barang.details && Array.isArray(barang.details)) {
                        for (var j = 0; j < barang.details.length; j++) {
                            var detail = barang.details[j];
                            if (detail) {
                                var imei = detail.imei || detail.serial || '';
                                if (imei) return imei;
                            }
                        }
                    }
                }
            }
            return '';
        }

        function getSKUName(record) {
            if (!record) return '-';
            if (record.namaBarang) return record.namaBarang;
            if (record.sku) return record.sku;
            if (record.barang && Array.isArray(record.barang) && record.barang.length > 0) {
                return record.barang[0].nama || '-';
            }
            return '-';
        }

        function normalizeValue(value) {
            if (value === undefined || value === null) return '';
            if (typeof value === 'string') return value.trim();
            if (typeof value === 'number') return value.toString();
            if (typeof value === 'boolean') return value.toString();
            if (value instanceof Date) return value.toISOString();
            return String(value);
        }

        function getNestedValue(obj, key) {
            if (!obj) return undefined;
            if (key.indexOf('.') > -1) {
                var parts = key.split('.');
                var current = obj;
                for (var i = 0; i < parts.length; i++) {
                    if (current === undefined || current === null) return undefined;
                    current = current[parts[i]];
                }
                return current;
            }
            return obj[key];
        }

        // ============================================================
        // FIELD CLASSIFICATION
        // ============================================================
        var FIELD_CLASSIFICATION = {
            critical: [
                'Sell Thru', 'Sell Out', 'Stock C.I', 'Coverage Active', 'Average Weekly', 'WOS'
            ],
            master: [
                'Customer', 'Depo', 'Nama Barang', 'SKU', 'Brand', 'Kategori', 'Sub Kategori'
            ],
            identity: [
                'IMEI', 'Serial Number'
            ]
        };

        // ============================================================
        // COMPARE RECORDS
        // ============================================================
        function compareRecords(oldRecord, newRecord) {
            var changes = [];

            var criticalFields = [
                { key: 'sellThru', label: 'Sell Thru' },
                { key: 'sellOut', label: 'Sell Out' },
                { key: 'stockCI', label: 'Stock C.I' },
                { key: 'coverageActive', label: 'Coverage Active' },
                { key: 'avgSellOutWeekly', label: 'Average Weekly' },
                { key: 'wos', label: 'WOS' }
            ];

            var masterFields = [
                { key: 'depo', label: 'Depo' },
                { key: 'customer', label: 'Customer' },
                { key: 'namaBarang', label: 'Nama Barang' },
                { key: 'barang', label: 'SKU' },
                { key: 'brand', label: 'Brand' },
                { key: 'kategori', label: 'Kategori' },
                { key: 'subKategori', label: 'Sub Kategori' }
            ];

            var identityFields = [
                { key: 'imei', label: 'IMEI' },
                { key: 'serial', label: 'Serial Number' }
            ];

            for (var i = 0; i < criticalFields.length; i++) {
                var field = criticalFields[i];
                var oldValue = getNestedValue(oldRecord, field.key);
                var newValue = getNestedValue(newRecord, field.key);
                if ((oldValue === undefined || oldValue === null || oldValue === '') &&
                    (newValue === undefined || newValue === null || newValue === '')) {
                    continue;
                }
                var oldNorm = normalizeValue(oldValue);
                var newNorm = normalizeValue(newValue);
                if (oldNorm !== newNorm) {
                    changes.push({
                        field: field.label,
                        oldValue: oldNorm !== '' ? oldNorm : '(kosong)',
                        newValue: newNorm !== '' ? newNorm : '(kosong)',
                        category: 'critical'
                    });
                }
            }

            for (var i = 0; i < masterFields.length; i++) {
                var field = masterFields[i];
                var oldValue = getNestedValue(oldRecord, field.key);
                var newValue = getNestedValue(newRecord, field.key);
                if ((oldValue === undefined || oldValue === null || oldValue === '') &&
                    (newValue === undefined || newValue === null || newValue === '')) {
                    continue;
                }
                var oldNorm = normalizeValue(oldValue);
                var newNorm = normalizeValue(newValue);
                if (oldNorm !== newNorm) {
                    changes.push({
                        field: field.label,
                        oldValue: oldNorm !== '' ? oldNorm : '(kosong)',
                        newValue: newNorm !== '' ? newNorm : '(kosong)',
                        category: 'master'
                    });
                }
            }

            for (var i = 0; i < identityFields.length; i++) {
                var field = identityFields[i];
                var oldValue = getNestedValue(oldRecord, field.key);
                var newValue = getNestedValue(newRecord, field.key);
                if ((oldValue === undefined || oldValue === null || oldValue === '') &&
                    (newValue === undefined || newValue === null || newValue === '')) {
                    continue;
                }
                var oldNorm = normalizeValue(oldValue);
                var newNorm = normalizeValue(newValue);
                if (oldNorm !== newNorm) {
                    changes.push({
                        field: field.label,
                        oldValue: oldNorm !== '' ? oldNorm : '(kosong)',
                        newValue: newNorm !== '' ? newNorm : '(kosong)',
                        category: 'identity'
                    });
                }
            }

            if (newRecord.barang && oldRecord.barang) {
                for (var j = 0; j < newRecord.barang.length; j++) {
                    var newBarang = newRecord.barang[j];
                    var oldBarang = oldRecord.barang[j] || {};
                    if (newBarang.details && oldBarang.details) {
                        for (var k = 0; k < newBarang.details.length; k++) {
                            var newDetail = newBarang.details[k];
                            var oldDetail = oldBarang.details[k] || {};
                            if (newDetail.imei !== oldDetail.imei) {
                                changes.push({
                                    field: 'IMEI (' + (k + 1) + ')',
                                    oldValue: oldDetail.imei || '(kosong)',
                                    newValue: newDetail.imei || '(kosong)',
                                    category: 'identity'
                                });
                            }
                            if (newDetail.tanggalSellThru !== oldDetail.tanggalSellThru) {
                                changes.push({
                                    field: 'Sell Thru (' + (k + 1) + ')',
                                    oldValue: oldDetail.tanggalSellThru || '(kosong)',
                                    newValue: newDetail.tanggalSellThru || '(kosong)',
                                    category: 'critical'
                                });
                            }
                        }
                    }
                }
            }

            return changes;
        }

        // ============================================================
        // CHANGE DETECTION
        // ============================================================
        function detectChanges(oldData, newData) {
            var oldIndex = new Map();
            var newIndex = new Map();
            var oldKeys = new Set();
            var newKeys = new Set();
            var skippedOld = 0;
            var skippedNew = 0;

            for (var i = 0; i < oldData.length; i++) {
                var record = oldData[i];
                var key = generateBusinessKey(record);
                if (key) {
                    oldIndex.set(key, record);
                    oldKeys.add(key);
                } else {
                    skippedOld++;
                }
            }

            for (var i = 0; i < newData.length; i++) {
                var record = newData[i];
                var key = generateBusinessKey(record);
                if (key) {
                    newIndex.set(key, record);
                    newKeys.add(key);
                } else {
                    skippedNew++;
                }
            }

            if (skippedOld > 0) {
                debugLog('⚠️ ' + skippedOld + ' record(s) di-skip dari oldData karena tidak memiliki Business Key');
            }
            if (skippedNew > 0) {
                debugLog('⚠️ ' + skippedNew + ' record(s) di-skip dari newData karena tidak memiliki Business Key');
            }

            var result = {
                newRecords: [],
                updatedRecords: [],
                deletedRecords: [],
                existingRecords: [],
                criticalUpdates: [],
                masterUpdates: [],
                identityUpdates: [],
                skipped: {
                    old: skippedOld,
                    new: skippedNew
                }
            };

            newKeys.forEach(function(key) {
                var newRecord = newIndex.get(key);
                if (oldIndex.has(key)) {
                    var oldRecord = oldIndex.get(key);
                    var changes = compareRecords(oldRecord, newRecord);
                    if (changes.length > 0) {
                        var criticalChanges = changes.filter(function(c) { return c.category === 'critical'; });
                        var masterChanges = changes.filter(function(c) { return c.category === 'master'; });
                        var identityChanges = changes.filter(function(c) { return c.category === 'identity'; });

                        var updatedInfo = {
                            businessKey: key,
                            depo: newRecord.depo || '-',
                            customer: newRecord.customer || '-',
                            sku: getSKUName(newRecord),
                            namaBarang: getSKUName(newRecord),
                            imei: extractIMEI(newRecord),
                            changes: changes,
                            criticalChanges: criticalChanges,
                            masterChanges: masterChanges,
                            identityChanges: identityChanges,
                            hasCriticalChange: criticalChanges.length > 0,
                            hasMasterChange: masterChanges.length > 0,
                            hasIdentityChange: identityChanges.length > 0
                        };

                        result.updatedRecords.push(updatedInfo);

                        if (criticalChanges.length > 0) {
                            result.criticalUpdates.push(updatedInfo);
                        }
                        if (masterChanges.length > 0) {
                            result.masterUpdates.push(updatedInfo);
                        }
                        if (identityChanges.length > 0) {
                            result.identityUpdates.push(updatedInfo);
                        }
                    } else {
                        result.existingRecords.push({
                            businessKey: key,
                            depo: newRecord.depo || '-',
                            customer: newRecord.customer || '-',
                            sku: getSKUName(newRecord)
                        });
                    }
                } else {
                    result.newRecords.push({
                        businessKey: key,
                        depo: newRecord.depo || '-',
                        customer: newRecord.customer || '-',
                        sku: getSKUName(newRecord),
                        namaBarang: getSKUName(newRecord),
                        imei: extractIMEI(newRecord),
                        data: newRecord
                    });
                }
            });

            oldKeys.forEach(function(key) {
                if (!newIndex.has(key)) {
                    var oldRecord = oldIndex.get(key);
                    result.deletedRecords.push({
                        businessKey: key,
                        depo: oldRecord.depo || '-',
                        customer: oldRecord.customer || '-',
                        sku: getSKUName(oldRecord),
                        namaBarang: getSKUName(oldRecord),
                        imei: extractIMEI(oldRecord),
                        data: oldRecord
                    });
                }
            });

            result.totalData = newData.length;

            return result;
        }

        // ============================================================
        // BUILD CHANGE HISTORY
        // ============================================================
        function buildChangeHistory(changeResult, lastSync) {
            var criticalUpdates = changeResult.criticalUpdates ? changeResult.criticalUpdates.length : 0;
            var masterUpdates = changeResult.masterUpdates ? changeResult.masterUpdates.length : 0;
            var identityUpdates = changeResult.identityUpdates ? changeResult.identityUpdates.length : 0;

            var timestamp = lastSync || getCurrentTime();

            if (changeResult.newRecords) {
                changeResult.newRecords.forEach(function(r) { r.timestamp = timestamp; });
            }
            if (changeResult.criticalUpdates) {
                changeResult.criticalUpdates.forEach(function(r) { r.timestamp = timestamp; });
            }
            if (changeResult.identityUpdates) {
                changeResult.identityUpdates.forEach(function(r) { r.timestamp = timestamp; });
            }
            if (changeResult.masterUpdates) {
                changeResult.masterUpdates.forEach(function(r) { r.timestamp = timestamp; });
            }
            if (changeResult.deletedRecords) {
                changeResult.deletedRecords.forEach(function(r) { r.timestamp = timestamp; });
            }

            return {
                timestamp: timestamp,
                summary: {
                    newRecords: changeResult.newRecords ? changeResult.newRecords.length : 0,
                    updatedRecords: changeResult.updatedRecords ? changeResult.updatedRecords.length : 0,
                    deletedRecords: changeResult.deletedRecords ? changeResult.deletedRecords.length : 0,
                    totalData: changeResult.totalData || 0,
                    criticalUpdates: criticalUpdates,
                    masterUpdates: masterUpdates,
                    identityUpdates: identityUpdates
                },
                details: changeResult
            };
        }

        // ============================================================
        // GET CURRENT TIME
        // ============================================================
        function getCurrentTime() {
            var now = new Date();
            return now.toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit',
                minute: '2-digit' });
        }

        // ============================================================
        // BUILD IMEI INDEX
        // ============================================================
        function buildIMEIIndex(data) {
            var index = {};
            if (!data || !Array.isArray(data) || data.length === 0) {
                return index;
            }
            for (var i = 0; i < data.length; i++) {
                var row = data[i];
                if (!row || !row.barang || !Array.isArray(row.barang)) continue;
                var depo = row.depo || '-';
                var customer = row.customer || '-';
                var kategori = row.kategori || '-';
                for (var j = 0; j < row.barang.length; j++) {
                    var barang = row.barang[j];
                    if (!barang || !barang.details || !Array.isArray(barang.details)) continue;
                    var namaBarang = barang.nama || '-';
                    for (var k = 0; k < barang.details.length; k++) {
                        var detail = barang.details[k];
                        if (!detail) continue;
                        var imei = detail.imei || detail.serial || '';
                        if (!imei) continue;
                        var normalizedImei = imei.toString().trim();
                        if (!index[normalizedImei]) {
                            index[normalizedImei] = [];
                        }
                        index[normalizedImei].push({
                            depo: depo,
                            customer: customer,
                            kategori: kategori,
                            namaBarang: namaBarang,
                            imei: imei,
                            tanggalSellThru: detail.tanggalSellThru || '-',
                            coverageActive: detail.coverage || '-',
                            isValidCoverage: detail.isValidCoverage,
                            status: detail.isValidCoverage === false ? 'Stock' : 'Terjual'
                        });
                    }
                }
            }
            return index;
        }

        // ============================================================
        // BUILD DUPLICATE MAP
        // ============================================================
        function buildDuplicateMap(duplicateData) {
            var map = {};
            var uniqueList = [];
            if (!duplicateData || !Array.isArray(duplicateData) || duplicateData.length === 0) {
                return { map: map, list: uniqueList };
            }
            var uniqueImeiMap = {};
            for (var i = 0; i < duplicateData.length; i++) {
                var item = duplicateData[i];
                if (!item) continue;
                var imei = item.imei || item.serial || item.serialNumber || '';
                if (!imei) continue;
                var normalizedImei = imei.toString().trim();
                if (!uniqueImeiMap[normalizedImei]) {
                    uniqueImeiMap[normalizedImei] = true;
                    uniqueList.push(normalizedImei);
                }
            }
            for (var j = 0; j < uniqueList.length; j++) {
                var imei = uniqueList[j];
                var locations = imeiIndex[imei] || [];
                if (locations.length > 0) {
                    map[imei] = locations;
                } else {
                    map[imei] = [{
                        depo: '-',
                        customer: '-',
                        kategori: '-',
                        namaBarang: '-',
                        imei: imei,
                        tanggalSellThru: '-',
                        coverageActive: '-',
                        isValidCoverage: null,
                        status: 'Unknown'
                    }];
                }
            }
            for (var key in map) {
                if (map.hasOwnProperty(key)) {
                    if (map[key].length < 2) {
                        debugLog("   ⚠️ WARNING: " + key + " hanya memiliki", map[key].length,
                            "record (minimal 2 diperlukan)");
                    }
                }
            }
            return { map: map, list: uniqueList };
        }

        // ============================================================
        // GET VALID DUPLICATE COUNT - SINGLE SOURCE OF TRUTH
        // ============================================================
        function getValidDuplicateCount() {
            if (!duplicateMap || typeof duplicateMap !== 'object') {
                return 0;
            }
            return Object.keys(duplicateMap).length;
        }

        // ============================================================
        // SWIPE TO CLOSE - BOTTOM SHEET
        // ============================================================
        var sheetTouchStartY = 0;
        var sheetTouchCurrentY = 0;
        var sheetIsDragging = false;
        var sheetCurrentTransform = 0;

        function initSwipeToClose() {
            var sheet = document.getElementById('duplicateSheet');
            var overlay = document.getElementById('duplicateOverlay');
            var body = document.getElementById('dupSheetBody');
            if (!sheet) return;

            sheet.addEventListener('touchstart', function(e) {
                if (body && body.scrollTop > 0) {
                    return;
                }
                var touch = e.touches[0];
                sheetTouchStartY = touch.clientY;
                sheetTouchCurrentY = touch.clientY;
                sheetIsDragging = true;
                sheetCurrentTransform = 0;
                sheet.classList.add('dragging');
            }, { passive: true });

            sheet.addEventListener('touchmove', function(e) {
                if (!sheetIsDragging) return;
                if (body && body.scrollTop > 0) {
                    sheetIsDragging = false;
                    sheet.classList.remove('dragging');
                    sheet.style.transform = '';
                    sheet.style.opacity = '';
                    if (overlay) {
                        overlay.style.opacity = '';
                    }
                    return;
                }
                var touch = e.touches[0];
                sheetTouchCurrentY = touch.clientY;
                var deltaY = sheetTouchCurrentY - sheetTouchStartY;

                if (deltaY > 0) {
                    sheetCurrentTransform = deltaY;
                    var progress = Math.min(deltaY / 200, 1);
                    sheet.style.transform = 'translateY(' + deltaY + 'px)';
                    sheet.style.opacity = 1 - (progress * 0.5);
                    if (overlay) {
                        overlay.style.opacity = 1 - progress;
                    }
                }
            }, { passive: true });

            sheet.addEventListener('touchend', function() {
                if (!sheetIsDragging) return;
                sheetIsDragging = false;
                sheet.classList.remove('dragging');
                sheet.classList.add('resetting');

                if (sheetCurrentTransform > 100) {
                    closeDuplicateSheet();
                } else {
                    sheet.style.transform = '';
                    sheet.style.opacity = '';
                    if (overlay) {
                        overlay.style.opacity = '';
                    }
                    setTimeout(function() {
                        sheet.classList.remove('resetting');
                    }, 300);
                }
                sheetCurrentTransform = 0;
            }, { passive: true });

            var isDraggingMouse = false;
            var mouseStartY = 0;
            var mouseCurrentY = 0;

            sheet.addEventListener('mousedown', function(e) {
                if (e.target.closest('.close-btn') || e.target.closest('.toast-close')) return;
                if (body && body.scrollTop > 0) {
                    return;
                }
                isDraggingMouse = true;
                mouseStartY = e.clientY;
                mouseCurrentY = e.clientY;
                sheetCurrentTransform = 0;
                sheet.classList.add('dragging');
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDraggingMouse) return;
                if (body && body.scrollTop > 0) {
                    isDraggingMouse = false;
                    sheet.classList.remove('dragging');
                    sheet.style.transform = '';
                    sheet.style.opacity = '';
                    if (overlay) {
                        overlay.style.opacity = '';
                    }
                    return;
                }
                mouseCurrentY = e.clientY;
                var deltaY = mouseCurrentY - mouseStartY;
                if (deltaY > 0) {
                    sheetCurrentTransform = deltaY;
                    var progress = Math.min(deltaY / 200, 1);
                    sheet.style.transform = 'translateY(' + deltaY + 'px)';
                    sheet.style.opacity = 1 - (progress * 0.5);
                    if (overlay) {
                        overlay.style.opacity = 1 - progress;
                    }
                }
            });

            document.addEventListener('mouseup', function() {
                if (!isDraggingMouse) return;
                isDraggingMouse = false;
                sheet.classList.remove('dragging');
                sheet.classList.add('resetting');

                if (sheetCurrentTransform > 100) {
                    closeDuplicateSheet();
                } else {
                    sheet.style.transform = '';
                    sheet.style.opacity = '';
                    if (overlay) {
                        overlay.style.opacity = '';
                    }
                    setTimeout(function() {
                        sheet.classList.remove('resetting');
                    }, 300);
                }
                sheetCurrentTransform = 0;
            });
        }

            if (summary.deletedRecords > 0) parts.push('🗑️ ' + summary.deletedRecords + ' Deleted');

            var message = 'Data Updated • ' + parts.join(' • ');
            showToast(message, 'info', 2500);

        // ============================================================
        // PRODUCT ICON HELPER
        // ============================================================
        function getProductIcon(skuName) {
            if (!skuName) return 'fa-solid fa-mobile-screen-button';
            var name = skuName.toLowerCase();
            if (name.includes('iphone')) {
                return 'fa-solid fa-mobile-screen-button';
            } else if (name.includes('ipad')) {
                return 'fa-solid fa-tablet-screen-button';
            } else if (name.includes('mac') || name.includes('macbook') || name.includes('imac') || name.includes(
                    'mac mini')) {
                return 'fa-solid fa-laptop';
            } else if (name.includes('watch') || name.includes('apple watch')) {
                return 'fa-solid fa-clock';
            } else if (name.includes('airpods') || name.includes('airpods pro') || name.includes('airpods max')) {
                return 'fa-solid fa-headphones';
            } else if (name.includes('adapter') || name.includes('charger') || name.includes('power') || name.includes(
                    'usb-c')) {
                return 'fa-solid fa-plug';
            } else if (name.includes('pencil') || name.includes('apple pencil')) {
                return 'fa-solid fa-pen';
            } else if (name.includes('airtag')) {
                return 'fa-solid fa-location-dot';
            } else {
                return 'fa-solid fa-mobile-screen-button';
            }
        }

            if (!isOpen) {
                var allCards = document.querySelectorAll('.customer-card');
                for (var i = 0; i < allCards.length; i++) {
                    var otherCard = allCards[i];
                    if (otherCard !== card) {
                        var otherBody = otherCard.querySelector('.body-collapse');
                        var otherChevron = otherCard.querySelector('.chevron');
                        if (otherBody) otherBody.classList.remove('open');
                        if (otherChevron) otherChevron.classList.remove('open');
                    }
                }
            }
        }

        // ============================================================
        // SHOW SKU DETAIL - MOBILE DENGAN LAZY LOADING
        // ============================================================

        function showSkuDetail(skuName, index, customer, depo) {
            var modalTitle = document.getElementById('modalTitle');
            var modalBody = document.getElementById('modalBody');
            if (!modalTitle || !modalBody) return;

            // Cari data dari rawData (tanpa details)
            var record = null;
            var skuData = null;
            
            for (var i = 0; i < rawData.length; i++) {
                var row = rawData[i];
                if (row.customer === customer && row.depo === depo) {
                    record = row;
                    if (row.barang && row.barang[index]) {
                        skuData = row.barang[index];
                    }
                    break;
                }
            }

            if (!record || !skuData) {
                modalTitle.innerHTML = '<i class="fas fa-circle-info me-2"></i>' + safeText(skuName);
                modalBody.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-muted);">Data tidak ditemukan</div>';
                myModal.show();
                return;
            }

            modalTitle.innerHTML = '<i class="fas fa-circle-info me-2"></i>' + safeText(skuName);

            // Tampilkan skeleton loading
            modalBody.innerHTML = `
                <div style="text-align:center;padding:20px;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <div style="margin-top:10px;color:var(--text-muted);font-size:0.7rem;">Memuat detail IMEI...</div>
                </div>
            `;

            myModal.show();

            // ✅ LAZY LOADING: Fetch detail dari endpoint terpisah
            var url = APP_CONFIG.WEB_APP_URL + '?action=detail' +
                '&customer=' + encodeURIComponent(customer) +
                '&depo=' + encodeURIComponent(depo) +
                '&sku=' + encodeURIComponent(skuName) +
                '&kategori=' + encodeURIComponent(record.kategori || '');

            if (APP_CONFIG.DEBUG) {
                debugLog('Fetching detail for:', customer, depo, skuName);
            }

            ApiHelper._fetchWithTimeout(url, 10000)
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.json();
                })
                .then(function(data) {
                    if (!data || !data.success) {
                        throw new Error(data.error || 'Gagal mengambil detail');
                    }

                    renderSkuDetailModalMobile(modalTitle, modalBody, skuName, skuData, data);
                })
                .catch(function(error) {
                    if (APP_CONFIG.DEBUG) {
                        debugError('Detail fetch error:', error);
                    }
                    modalBody.innerHTML = `
                        <div style="padding:20px;text-align:center;color:var(--danger);font-size:0.8rem;">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            Gagal memuat detail: ${error.message}
                            <br><br>
                            <button class="btn btn-sm btn-outline-primary" onclick="showSkuDetail('${escapeJsString(skuName)}', ${index}, '${escapeJsString(customer)}', '${escapeJsString(depo)}')">
                                <i class="fas fa-redo me-1"></i> Coba Lagi
                            </button>
                        </div>
                    `;
                });
        }

        // ============================================================
        // RENDER SKU DETAIL MODAL - MOBILE
        // ============================================================

        function renderSkuDetailModalMobile(modalTitle, modalBody, skuName, skuData, detailData) {
            // Gunakan render yang sama dengan Dashboard
            renderSkuDetailModal(modalTitle, modalBody, skuName, skuData, detailData);
        }

        // ============================================================
        // RENDER SKU DETAIL MODAL (Shared)
        // ============================================================

        function renderSkuDetailModal(modalTitle, modalBody, skuName, skuData, detailData) {
            var html = '';
            
            html += `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;font-size:0.6rem;">
                    <div style="background:var(--bg-input);padding:8px 12px;border-radius:10px;">
                        <div style="color:var(--text-muted);font-weight:600;">Qty</div>
                        <div style="font-weight:700;font-size:0.8rem;">${skuData.sellThru || 0}</div>
                    </div>
                    <div style="background:var(--bg-input);padding:8px 12px;border-radius:10px;">
                        <div style="color:var(--text-muted);font-weight:600;">Sell Out</div>
                        <div style="font-weight:700;font-size:0.8rem;color:var(--success);">${skuData.sellOut || 0}</div>
                    </div>
                    <div style="background:var(--bg-input);padding:8px 12px;border-radius:10px;">
                        <div style="color:var(--text-muted);font-weight:600;">Stock CI</div>
                        <div style="font-weight:700;font-size:0.8rem;">${skuData.stockCI || 0}</div>
                    </div>
                    <div style="background:var(--bg-input);padding:8px 12px;border-radius:10px;">
                        <div style="color:var(--text-muted);font-weight:600;">WOS</div>
                        <div style="font-weight:700;font-size:0.8rem;">${skuData.wos || 0}</div>
                    </div>
                </div>
            `;

            if (detailData.details && detailData.details.length > 0) {
                html += `
                    <div class="imei-card">
                        <div class="imei-header">
                            <span class="imei-name"><i class="fas fa-sim-card me-2"></i>IMEI Details</span>
                            <span class="badge bg-secondary">${detailData.details.length}</span>
                        </div>
                        <div class="imei-table-wrap" style="overflow-x:auto;">
                            <table class="table table-sm table-hover">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>IMEI</th>
                                        <th>Sell Thru</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;

                for (var j = 0; j < detailData.details.length; j++) {
                    var detail = detailData.details[j];
                    var statusClass = detail.status === 'Stock' ? 'aging-dead' : 'aging-normal';
                    var statusLabel = detail.status || 'Terjual';

                    html += `
                        <tr>
                            <td>${j + 1}</td>
                            <td><span class="imei-code" onclick="copyIMEI('${escapeJsString(detail.imei)}')">${safeText(detail.imei)}</span></td>
                            <td>${safeText(detail.tanggalSellThru)}</td>
                            <td><span class="badge-aging-soft ${statusClass}">${statusLabel}</span></td>
                        </tr>
                    `;
                }

                html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div style="padding:12px;text-align:center;color:var(--text-muted);font-size:0.6rem;">
                        <i class="fas fa-info-circle me-1"></i> Tidak ada detail IMEI
                    </div>
                `;
            }

            modalBody.innerHTML = html;
        }

        // ============================================================
        // COPY IMEI
        // ============================================================
        function copyIMEI(imei) {
            if (!imei) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(imei)
                    .then(function() {
                        showToast('IMEI copied: ' + imei, 'success', 2000);
                    })
                    .catch(function() {
                        fallbackCopy(imei);
                    });
            } else {
                fallbackCopy(imei);
            }
        }

        function fallbackCopy(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('IMEI copied: ' + text, 'success', 2000);
            } catch (e) {
                showToast('Gagal menyalin IMEI', 'error', 2000);
            }
            document.body.removeChild(textarea);
        }

        // ============================================================
        // UPDATE KPI FROM DATA
        // ============================================================
        function updateKPIFromData(data) {
            if (!data || !Array.isArray(data) || data.length === 0) {
                document.getElementById('kpiSellThru').innerText = '0';
                document.getElementById('kpiSellOut').innerText = '0';
                document.getElementById('kpiStockCI').innerText = '0';
                document.getElementById('kpiAvgWOS').innerText = '0';
                return;
            }

            var totalSellThru = 0;
            var totalSellOut = 0;
            var totalStockCI = 0;
            var wosSum = 0;
            var wosCount = 0;

            for (var i = 0; i < data.length; i++) {
                var row = data[i];
                if (row.sellThru) totalSellThru += parseInt(row.sellThru) || 0;
                if (row.sellOut) totalSellOut += parseInt(row.sellOut) || 0;
                if (row.stockCI) totalStockCI += parseInt(row.stockCI) || 0;
                if (row.wos !== undefined && row.wos !== null) {
                    wosSum += parseFloat(row.wos) || 0;
                    wosCount++;
                }
            }

            document.getElementById('kpiSellThru').innerText = totalSellThru.toLocaleString();
            document.getElementById('kpiSellOut').innerText = totalSellOut.toLocaleString();
            document.getElementById('kpiStockCI').innerText = totalStockCI.toLocaleString();

            var avgWOS = wosCount > 0 ? (wosSum / wosCount) : 0;
            document.getElementById('kpiAvgWOS').innerText = avgWOS.toFixed(1);
        }

        // ============================================================
        // UPDATE WORST WOS
        // ============================================================
        function updateWorstWos(data) {
            var container = document.getElementById('worstWosList');
            var countBadge = document.getElementById('worstCount');
            if (!container) return;

            if (!data || !Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<div class="worst-empty">Tidak ada data</div>';
                if (countBadge) countBadge.innerText = '0';
                return;
            }

            var skuWosList = [];
            for (var i = 0; i < data.length; i++) {
                var row = data[i];
                if (!row.barang || !Array.isArray(row.barang)) continue;
                for (var j = 0; j < row.barang.length; j++) {
                    var barang = row.barang[j];
                    if (!barang) continue;
                    var wos = parseFloat(barang.wos) || 0;
                    var nama = barang.nama || '-';
                    var customer = row.customer || '-';
                    var depo = row.depo || '-';
                    skuWosList.push({
                        nama: nama,
                        wos: wos,
                        customer: customer,
                        depo: depo,
                        stockCI: barang.stockCI || 0
                    });
                }
            }

            skuWosList.sort(function(a, b) {
                return b.wos - a.wos;
            });

            var top5 = skuWosList.slice(0, 5);
            if (countBadge) countBadge.innerText = top5.length;

            if (top5.length === 0) {
                container.innerHTML = '<div class="worst-empty">Semua SKU memiliki WOS yang baik</div>';
                return;
            }

            var html = '';
            for (var k = 0; k < top5.length; k++) {
                var item = top5[k];
                var rank = k + 1;
                var wosClass = 'bg-danger';
                if (item.wos <= 4) wosClass = 'bg-success';
                else if (item.wos <= 8) wosClass = 'bg-warning';

                html += `
                    <div class="worst-item" onclick="showWorstDetail('${escapeJsString(item.nama)}', '${escapeJsString(item.customer)}', '${escapeJsString(item.depo)}')">
                        <div class="left">
                            <span class="rank">#${rank}</span>
                            <span class="name">${safeText(item.nama)}</span>
                            <span class="wos-badge-mini ${wosClass}" style="font-size:0.4rem;">${item.wos.toFixed(1)}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:4px;">
                            <span style="font-size:0.45rem;color:var(--text-muted);">${safeText(item.customer)}</span>
                            <span class="arrow"><i class="fa-regular fa-chevron-right"></i></span>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // ============================================================
        // SHOW WORST DETAIL
        // ============================================================
        function showWorstDetail(skuName, customer, depo) {
            var record = null;
            for (var i = 0; i < rawData.length; i++) {
                var row = rawData[i];
                if (row.customer === customer && row.depo === depo) {
                    record = row;
                    break;
                }
            }

            if (!record) {
                showToast('Data tidak ditemukan', 'error', 2000);
                return;
            }

            var skuIndex = -1;
            if (record.barang && Array.isArray(record.barang)) {
                for (var j = 0; j < record.barang.length; j++) {
                    if (record.barang[j].nama === skuName) {
                        skuIndex = j;
                        break;
                    }
                }
            }

            if (skuIndex === -1) {
                showToast('SKU tidak ditemukan', 'error', 2000);
                return;
            }

            showSkuDetail(skuName, skuIndex, customer, depo);
        }

        // ============================================================
        // UPDATE WOS BADGE
        // ============================================================
        function updateWosBadge(data) {
            var wosBadge = document.getElementById('wosBadge');
            if (!wosBadge) return;

            var hasWosProblem = false;
            if (data && Array.isArray(data)) {
                for (var i = 0; i < data.length; i++) {
                    var row = data[i];
                    if (row && row.wos !== undefined && row.wos !== null) {
                        var wos = parseFloat(row.wos);
                        if (wos > 8) {
                            hasWosProblem = true;
                            break;
                        }
                    }
                }
            }
            wosBadge.style.display = hasWosProblem ? 'block' : 'none';
        }

        // ============================================================
        // FETCH DATA - Menggunakan ApiHelper
        // ============================================================
        function fetchData() {
            if (isRefreshing) return;
            isRefreshing = true;

            var fab = document.getElementById('fabRefresh');
            if (fab) fab.classList.add('loading');

            showToast('Mengambil data terbaru...', 'info', 2000);
            debugLog('Fetching data...');

            ApiHelper.fetchDashboard()
                .then(function(data) {
                    if (!data || !data.success) {
                        throw new Error(data.error || 'Data tidak valid');
                    }
                    if (!data.rows || !Array.isArray(data.rows)) {
                        throw new Error('Data rows tidak valid');
                    }

                    debugLog('Data received: ' + data.rows.length + ' rows');
                    processData(data);

                    var now = getCurrentTime();
                    document.getElementById('syncTime').innerText = now;

                    showToast('Data berhasil diperbarui • ' + data.rows.length + ' record', 'success', 2000);
                    isRefreshing = false;
                    if (fab) fab.classList.remove('loading');

                    scheduleAutoRefresh();
                })
                .catch(function(error) {
                    debugError('Fetch error: ' + error.message);
                    showToast('Gagal mengambil data: ' + error.message, 'error', 3000);
                    isRefreshing = false;
                    if (fab) fab.classList.remove('loading');
                    scheduleAutoRefresh();
                });
        }

        // ============================================================
        // PROCESS DATA
        // ============================================================
        function processData(data) {
            var previousRawData = rawData;
            rawData = data.rows;

            imeiIndex = buildIMEIIndex(data.rows);

            var dupResult = buildDuplicateMap(data.rows);
            duplicateMap = dupResult.map;
            duplicateImeiList = dupResult.list;

            updateProgress(100);
            hideLoadingScreen();

            var depos = [];
            data.rows.forEach(function(row) {
                if (row.depo && depos.indexOf(row.depo) === -1) {
                    depos.push(row.depo);
                }
            });
            setupChips(depos);

            applyAllFilters();

            showDuplicateAlertMobile();

            if (previousRawData && previousRawData.length > 0) {
                var changeResult = detectChanges(previousRawData, data.rows);
                if (changeResult.updatedRecords.length > 0 || changeResult.newRecords.length > 0 || changeResult
                    .deletedRecords.length > 0) {
                    var changeHistory = buildChangeHistory(changeResult);
                    showChangeNotificationMobile(changeHistory);
                }
            }

            updateWosBadge(data.rows);

            isDataLoaded = true;
        }

        // ============================================================
        // AUTO REFRESH - SETTIMEOUT CHAIN
        // ============================================================
        function scheduleAutoRefresh() {
            if (autoRefreshTimeout) {
                clearTimeout(autoRefreshTimeout);
                autoRefreshTimeout = null;
            }

            autoRefreshTimeout = setTimeout(function() {
                if (navigator.onLine) {
                    fetchData();
                } else {
                    showToast('Tidak ada koneksi internet. Refresh otomatis ditunda.', 'warning', 3000);
                    scheduleAutoRefresh();
                }
            }, AUTO_REFRESH_INTERVAL);
        }

        // ============================================================
        // NETWORK STATUS
        // ============================================================
        function handleNetworkStatus() {
            if (navigator.onLine) {
                showToast('Koneksi internet kembali', 'success', 2000);
                if (!isDataLoaded) {
                    fetchData();
                }
            } else {
                showToast('Koneksi internet terputus', 'error', 3000);
            }
        }

        // ============================================================
        // VISIBILITY API
        // ============================================================
        function handleVisibilityChange() {
            if (!document.hidden && !isDataLoaded) {
                fetchData();
            }
            if (!document.hidden && navigator.onLine) {
                if (isDataLoaded) {
                    fetchData();
                }
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            detectSystemTheme();
            initSwipeToClose();

            window.addEventListener('online', handleNetworkStatus);
            window.addEventListener('offline', handleNetworkStatus);
            document.addEventListener('visibilitychange', handleVisibilityChange);

            debugLog('Mobile initialized, version: ' + APP_CONFIG.FALLBACK_VERSION);
            fetchData();

            var progress = 0;
            var progressInterval = setInterval(function() {
                progress += 5;
                if (progress <= 90) {
                    updateProgress(progress);
                } else {
                    clearInterval(progressInterval);
                }
            }, 100);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
