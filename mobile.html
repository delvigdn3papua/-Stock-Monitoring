<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e14">
    <title>Apple Coverage · Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CONFIG - Production v1.0.3 -->
    <script src="config.js"></script>
    
    <style>
        /* ============================================================
           CSS VARIABLES - DESIGN SYSTEM
           ============================================================ */
        :root {
            --bg-body: #f0f4fa;
            --bg-card: rgba(255,255,255,0.88);
            --bg-card-solid: #ffffff;
            --bg-nav: rgba(255,255,255,0.92);
            --bg-nav-bottom: rgba(255,255,255,0.94);
            --bg-input: #f2f6fb;
            --bg-skeleton: #e8edf4;
            --bg-skeleton-shine: #dce3ed;
            --bg-secondary: rgba(240, 244, 250, 0.5);
            --text-primary: #0a1a2b;
            --text-secondary: #2c4b6f;
            --text-muted: #5e6f86;
            --text-light: #8a9bb0;
            --border-color: rgba(200, 215, 230, 0.3);
            --shadow-card: 0 2px 16px rgba(0,0,0,0.04);
            --shadow-nav: 0 -2px 20px rgba(0,0,0,0.06);
            --radius-card: 20px;
            --radius-btn: 14px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.35s ease;
            --ease-standard: cubic-bezier(0.22, 1, 0.36, 1);
            
            --danger: #DC2626;
            --danger-bg: rgba(220, 38, 38, 0.08);
            --success: #16A34A;
            --success-bg: rgba(22, 163, 74, 0.08);
            --warning: #EA580C;
            --warning-bg: rgba(234, 88, 12, 0.08);
            --primary: #2563EB;
            --primary-bg: rgba(37, 99, 235, 0.08);
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-body: #0a0e14;
            --bg-card: rgba(20, 27, 36, 0.92);
            --bg-card-solid: #141b24;
            --bg-nav: rgba(15, 22, 32, 0.92);
            --bg-nav-bottom: rgba(15, 22, 32, 0.94);
            --bg-input: #1a2330;
            --bg-skeleton: #1e2a3a;
            --bg-skeleton-shine: #2a3a4a;
            --bg-secondary: rgba(20, 27, 36, 0.5);
            --text-primary: #e8edf4;
            --text-secondary: #a0b8d0;
            --text-muted: #6a7f9a;
            --text-light: #5a6f8a;
            --border-color: rgba(48, 60, 80, 0.4);
            --shadow-card: 0 2px 16px rgba(0,0,0,0.3);
            --shadow-nav: 0 -2px 20px rgba(0,0,0,0.4);
            --danger: #EF4444;
            --danger-bg: rgba(239, 68, 68, 0.12);
            --success: #22C55E;
            --success-bg: rgba(34, 197, 94, 0.12);
            --warning: #F97316;
            --warning-bg: rgba(249, 115, 22, 0.12);
            --primary: #3B82F6;
            --primary-bg: rgba(59, 130, 246, 0.12);
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            box-sizing: border-box;
        }
        ::selection { background: transparent !important; }
        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color var(--transition-slow), color var(--transition-slow);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* ============================================================
           LOADING SCREEN
           ============================================================ */
        #loadingScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity var(--transition-slow), visibility var(--transition-slow);
        }
        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loadingScreen .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px;
        }
        .loader-icon {
            width: 56px;
            height: 56px;
            animation: pulse-loader 1.2s ease-in-out infinite;
        }
        @keyframes pulse-loader {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.92); opacity: 0.6; }
        }
        .loader-icon svg { width: 100%; height: 100%; }
        .loader-icon .fill-primary { fill: #ff6b35; }
        .loader-icon .fill-secondary { fill: #ff8c5a; }
        #loadingScreen .loader-title {
            color: #e8edf4;
            font-weight: 700;
            font-size: 1rem;
        }
        #loadingScreen .loader-subtitle {
            color: #6a7f9a;
            font-size: 0.6rem;
            font-weight: 500;
        }
        #loadingScreen .loader-progress {
            width: 160px;
            height: 3px;
            background: #1a2330;
            border-radius: 4px;
            overflow: hidden;
        }
        #loadingScreen .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b35, #ff8c5a);
            border-radius: 4px;
            transition: width var(--transition-normal);
        }

        /* ============================================================
           NAVBAR
           ============================================================ */
        .navbar-app {
            background: var(--bg-nav);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 56px;
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .navbar-app .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .navbar-app .brand .icon {
            background: linear-gradient(145deg, #1a1a1a, #2c2c2c);
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .navbar-app .brand .title {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .navbar-app .brand .subtitle {
            font-size: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
            display: block;
        }
        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar-actions .sync-badge {
            background: var(--bg-input);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background-color var(--transition-fast), color var(--transition-fast);
        }
        .navbar-actions .btn-icon {
            background: transparent;
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: background-color var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
        }
        .navbar-actions .btn-icon:active { transform: scale(0.88); }
        .navbar-actions .btn-icon:hover { background: var(--bg-input); }

        /* ============================================================
           STICKY KPI
           ============================================================ */
        .kpi-sticky-wrapper {
            position: sticky;
            top: 56px;
            z-index: 90;
            background: var(--bg-body);
            padding: 8px 12px 8px;
            transition: background-color var(--transition-slow);
        }
        .kpi-sticky-wrapper .kpi-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 2px 0;
        }
        .kpi-sticky-wrapper .kpi-scroll::-webkit-scrollbar { display: none; }
        .kpi-sticky-wrapper .kpi-mini {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 8px 14px;
            flex: 0 0 auto;
            min-width: 80px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .kpi-sticky-wrapper .kpi-mini .label {
            font-size: 0.45rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .kpi-sticky-wrapper .kpi-mini .value {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .kpi-sticky-wrapper .kpi-mini .value.text-success { color: var(--success); }
        .kpi-sticky-wrapper .kpi-mini .value.text-danger { color: var(--danger); }
        .kpi-sticky-wrapper .kpi-mini .value.text-warning { color: var(--warning); }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main-content {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 12px 12px;
        }

        /* ============================================================
           DUPLICATE ALERT - MOBILE
           ============================================================ */
        .duplicate-alert-mobile {
            background: var(--danger-bg);
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            animation: slideDownAlert var(--transition-fast) var(--ease-standard);
            -webkit-tap-highlight-color: transparent;
            transition: transform var(--transition-fast), background-color var(--transition-fast), border-color var(--transition-fast);
        }
        .duplicate-alert-mobile:active {
            transform: scale(0.97);
            background: rgba(220, 38, 38, 0.12);
        }
        @keyframes slideDownAlert {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .duplicate-alert-mobile .icon {
            color: var(--danger);
            font-size: 1rem;
            flex-shrink: 0;
        }
        .duplicate-alert-mobile .content {
            flex: 1;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--danger);
        }
        .duplicate-alert-mobile .content .desc {
            font-weight: 400;
            opacity: 0.7;
            display: block;
            font-size: 0.55rem;
        }
        .duplicate-alert-mobile .arrow {
            color: var(--danger);
            font-size: 0.6rem;
            opacity: 0.5;
        }

        /* ============================================================
           SEARCH BAR
           ============================================================ */
        .search-bar {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .search-bar i {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
            padding: 4px 0;
        }
        .search-bar input::placeholder {
            color: var(--text-light);
            font-weight: 400;
        }
        .search-bar .clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            padding: 0 4px;
            display: none;
        }
        .search-bar .clear-btn.show { display: block; }

        /* ============================================================
           QUICK FILTER CHIPS
           ============================================================ */
        .chips-wrapper {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 2px 0 10px;
            margin-bottom: 2px;
        }
        .chips-wrapper::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--bg-input);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid transparent;
            white-space: nowrap;
            cursor: pointer;
            transition: background-color var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
            flex-shrink: 0;
        }
        .chip:active { transform: scale(0.94); }
        .chip.active {
            background: #2b8c5e;
            color: #ffffff;
            border-color: #2b8c5e;
        }
        .chip.active:active { transform: scale(0.94); }
        [data-theme="dark"] .chip.active { background: #2b8c5e; }

        /* ============================================================
           WORST WOS CARD
           ============================================================ */
        .worst-wos-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            margin-bottom: 12px;
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .worst-wos-card .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .worst-wos-card .header .title {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--danger);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .worst-wos-card .header .title i { font-size: 0.6rem; animation: pulse-warning 2s infinite; }
        @keyframes pulse-warning { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .worst-wos-card .header .badge-count {
            background: var(--bg-input);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .worst-wos-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .worst-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 10px;
            border-radius: 10px;
            background: rgba(220, 53, 69, 0.04);
            cursor: pointer;
            transition: background-color var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast);
            border: 1px solid transparent;
        }
        .worst-item:active { transform: scale(0.97); background: rgba(220, 53, 69, 0.1); }
        .worst-item .left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .worst-item .rank {
            font-weight: 700;
            font-size: 0.5rem;
            color: var(--danger);
            min-width: 20px;
        }
        .worst-item .name {
            font-weight: 600;
            font-size: 0.55rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .worst-item .wos-value {
            font-weight: 700;
            font-size: 0.5rem;
            color: var(--danger);
            background: rgba(220, 53, 69, 0.08);
            padding: 1px 10px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .worst-item .arrow {
            color: var(--text-light);
            font-size: 0.4rem;
            margin-left: 4px;
            opacity: 0.3;
        }
        [data-theme="dark"] .worst-item { background: rgba(220, 53, 69, 0.06); }
        [data-theme="dark"] .worst-item:active { background: rgba(220, 53, 69, 0.12); }
        [data-theme="dark"] .worst-item .name { color: #c8d2e0; }
        .worst-empty {
            font-size: 0.55rem;
            color: var(--text-muted);
            text-align: center;
            padding: 6px 0;
        }

        /* ============================================================
           CUSTOMER CARDS
           ============================================================ */
        .customer-card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: var(--radius-card);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            margin-bottom: 10px;
            overflow: hidden;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }
        .customer-card:active { transform: scale(0.99); }
        .customer-card .main {
            padding: 12px 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
        .customer-card .main .left {
            flex: 1;
            min-width: 0;
        }
        .customer-card .main .left .depo {
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .customer-card .main .left .name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-primary);
            margin-top: 1px;
        }
        .customer-card .main .stats {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .customer-card .main .stats .stat {
            text-align: center;
        }
        .customer-card .main .stats .stat .num {
            font-weight: 800;
            font-size: 0.8rem;
            color: var(--text-primary);
            display: block;
            line-height: 1.1;
        }
        .customer-card .main .stats .stat .num.text-success { color: var(--success); }
        .customer-card .main .stats .stat .num.text-danger { color: var(--danger); }
        .customer-card .main .stats .stat .lbl {
            font-size: 0.4rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        .customer-card .main .chevron {
            width: 26px; height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--bg-input);
            transition: background-color var(--transition-normal), transform var(--transition-normal);
            flex-shrink: 0;
            margin-left: 4px;
        }
        .customer-card .main .chevron i {
            font-size: 0.55rem;
            color: var(--text-muted);
            transition: transform var(--transition-normal);
        }
        .customer-card .main .chevron.open i { transform: rotate(180deg); }

        .customer-card .body-collapse {
            overflow: hidden;
            max-height: 0;
            transition: max-height var(--transition-slow) var(--ease-standard), opacity var(--transition-normal);
            opacity: 0;
        }
        .customer-card .body-collapse.open {
            max-height: 2000px;
            opacity: 1;
        }
        .customer-card .body-collapse .inner {
            padding: 4px 14px 12px;
            border-top: 1px solid var(--border-color);
        }
        .customer-card .body-collapse .kategori-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 4px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color var(--transition-fast), transform var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
        }
        .customer-card .body-collapse .kategori-row:active { transform: scale(0.98); }
        .customer-card .body-collapse .kategori-row:last-child { border-bottom: none; }
        .customer-card .body-collapse .kategori-row .kname {
            font-weight: 600;
            font-size: 0.65rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .customer-card .body-collapse .kategori-row .kname .badge-excluded {
            font-size: 0.4rem;
            background: var(--bg-input);
            color: var(--text-muted);
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .customer-card .body-collapse .kategori-row .kstats {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .customer-card .body-collapse .kategori-row .kstats .ks {
            text-align: center;
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 20px;
        }
        .customer-card .body-collapse .kategori-row .kstats .ks .num {
            display: block;
            font-weight: 800;
            font-size: 0.6rem;
            color: var(--text-primary);
        }
        .customer-card .body-collapse .kategori-row .kstats .ks .num.text-success { color: var(--success); }
        .customer-card .body-collapse .kategori-row .kstats .ks .num.text-danger { color: var(--danger); }
        .customer-card .body-collapse .kategori-row .kstats .btn-detail {
            background: var(--bg-input);
            border: none;
            border-radius: 8px;
            padding: 2px 10px;
            font-size: 0.45rem;
            font-weight: 700;
            color: var(--text-secondary);
            transition: background-color var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
        }
        .customer-card .body-collapse .kategori-row .kstats .btn-detail:active { transform: scale(0.92); }

        /* WOS Badge Mini */
        .wos-badge-mini {
            display: inline-block;
            padding: 1px 8px;
            font-size: 0.5rem;
            font-weight: 700;
            color: #fff;
            border-radius: 6px;
            min-width: 28px;
            text-align: center;
        }
        .wos-badge-mini.bg-success { background: var(--success); }
        .wos-badge-mini.bg-danger { background: var(--danger); }
        .wos-badge-mini.bg-warning { background: var(--warning); color: #1a1a1a; }
        .wos-badge-mini.bg-secondary { background: var(--text-muted); }

        /* ============================================================
           OOS & LOW STOCK BADGE - MOBILE
           ============================================================ */
        .badge-oos-mobile {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 1px 10px 1px 8px;
            border-radius: 20px;
            font-size: 0.45rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-left: 4px;
            flex-shrink: 0;
        }
        .badge-oos-mobile i { font-size: 0.4rem; }

        .badge-low-stock-mobile {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--warning-bg);
            color: var(--warning);
            border: 1px solid var(--warning);
            padding: 1px 10px 1px 8px;
            border-radius: 20px;
            font-size: 0.45rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-left: 4px;
            flex-shrink: 0;
        }
        .badge-low-stock-mobile i { font-size: 0.4rem; }

        [data-theme="dark"] .badge-oos-mobile {
            background: #3a1a1a;
            color: #f87171;
            border-color: #7f1d1d;
        }
        [data-theme="dark"] .badge-low-stock-mobile {
            background: #3a2a1a;
            color: #fbbf24;
            border-color: #78350f;
        }

        /* ============================================================
           BOTTOM NAVIGATION
           ============================================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-nav-bottom);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0 env(safe-area-inset-bottom, 8px);
            z-index: 200;
            box-shadow: var(--shadow-nav);
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.45rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            transition: color var(--transition-fast);
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav .nav-item i {
            font-size: 1.2rem;
            transition: transform var(--transition-fast);
        }
        .bottom-nav .nav-item:active i { transform: scale(0.85); }
        .bottom-nav .nav-item.active {
            color: #2b8c5e;
        }
        .bottom-nav .nav-item.active i { transform: scale(1.05); }
        .bottom-nav .nav-item .badge-dot {
            position: absolute;
            top: 2px;
            right: 6px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--bg-nav-bottom);
        }

        /* ============================================================
           FLOATING ACTION BUTTON - REFRESH
           ============================================================ */
        .fab-refresh {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2b8c5e;
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 20px rgba(43, 140, 94, 0.35);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 150;
            transition: background-color var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
        }
        .fab-refresh:active { transform: scale(0.88); }
        .fab-refresh.loading {
            transition: transform var(--transition-slow);
        }
        .fab-refresh .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .fab-refresh.loading .icon { display: none; }
        .fab-refresh.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
           SKELETON LOADING
           ============================================================ */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-skeleton) 4%, var(--bg-skeleton-shine) 25%, var(--bg-skeleton) 36%);
            background-size: 1200px 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: -600px 0; }
            100% { background-position: 600px 0; }
        }
        .skeleton-card {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
        }
        .skeleton-card .skeleton-line { height: 12px; border-radius: 6px; margin-bottom: 6px; }
        .skeleton-card .skeleton-line.short { width: 60px; }
        .skeleton-card .skeleton-line.medium { width: 120px; }
        .skeleton-card .skeleton-line.long { width: 180px; }
        .skeleton-card .skeleton-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .skeleton-card .skeleton-row .skeleton-box {
            height: 32px;
            width: 48px;
            border-radius: 8px;
        }

        /* ============================================================
           MODAL
           ============================================================ */
        .modal-content {
            border-radius: 24px;
            border: none;
            background: var(--bg-card-solid) !important;
            transition: background-color var(--transition-slow);
        }
        .modal-header-custom {
            background: var(--bg-input) !important;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .modal-header-custom h5 {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-primary) !important;
            margin: 0;
        }
        .modal-body-custom {
            padding: 14px;
            background: transparent !important;
        }
        .modal-body-custom .imei-card {
            background: var(--bg-card) !important;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            overflow: hidden;
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .modal-body-custom .imei-card .imei-header {
            padding: 8px 12px;
            background: var(--bg-input) !important;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            transition: background-color var(--transition-slow), border-color var(--transition-slow);
        }
        .modal-body-custom .imei-card .imei-header .imei-name {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--text-primary) !important;
            flex: 1;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .modal-body-custom .imei-card .imei-header .badge {
            font-size: 0.45rem;
            font-weight: 700;
            padding: 2px 8px;
        }
        .modal-body-custom .imei-table-wrap table {
            font-size: 0.55rem;
            margin-bottom: 0;
        }
        .modal-body-custom .imei-table-wrap table thead th {
            background: #2d3a4a !important;
            color: #e8edf4 !important;
            font-size: 0.45rem;
            text-transform: uppercase;
            padding: 5px 8px;
            border: none;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .modal-body-custom .imei-table-wrap table tbody td {
            padding: 5px 8px;
            font-size: 0.55rem;
            border-color: var(--border-color);
            color: var(--text-secondary) !important;
            background: transparent !important;
            font-weight: 600;
        }
        .modal-body-custom .imei-table-wrap table tbody td .imei-code {
            font-family: 'SF Mono', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-primary) !important;
            cursor: pointer;
            user-select: all !important;
            -webkit-user-select: all !important;
        }
        .modal-body-custom .imei-table-wrap table tbody td .badge-aging-soft {
            font-size: 0.45rem;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            font-weight: 700;
        }
        .badge-aging-soft.aging-sold { background: var(--success-bg); color: var(--success); }
        .badge-aging-soft.aging-na { background: var(--bg-input); color: var(--text-muted); }
        .badge-aging-soft.aging-normal { background: var(--success-bg); color: var(--success); }
        .badge-aging-soft.aging-slow { background: var(--warning-bg); color: var(--warning); }
        .badge-aging-soft.aging-critical { background: var(--warning-bg); color: var(--warning); }
        .badge-aging-soft.aging-dead { background: var(--danger-bg); color: var(--danger); }

        [data-theme="dark"] .modal-content { background: var(--bg-card-solid) !important; }
        [data-theme="dark"] .modal-header-custom { background: var(--bg-input) !important; }
        [data-theme="dark"] .modal-body-custom .imei-card { background: var(--bg-card) !important; }
        [data-theme="dark"] .modal-body-custom .imei-card .imei-header { background: var(--bg-input) !important; }
        [data-theme="dark"] .modal-body-custom .imei-table-wrap table tbody td { color: #c8d2e0 !important; }
        [data-theme="dark"] .modal-body-custom .imei-table-wrap table tbody td .imei-code { color: #e8edf4 !important; }

        /* ============================================================
           BOTTOM SHEET - DUPLICATE DETAIL
           ============================================================ */
        .duplicate-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card-solid);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            max-height: 70vh;
            transform: translateY(100%);
            transition: transform var(--transition-slow) var(--ease-standard), opacity var(--transition-normal);
            opacity: 0;
            overflow: hidden;
            border-top: 1px solid var(--border-color);
        }
        .duplicate-sheet.open {
            transform: translateY(0);
            opacity: 1;
        }
        .duplicate-sheet.dragging {
            transition: none !important;
        }
        .duplicate-sheet.resetting {
            transition: transform var(--transition-normal) var(--ease-standard), opacity var(--transition-normal) !important;
        }
        .duplicate-sheet .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }
        .duplicate-sheet .sheet-header .title {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .duplicate-sheet .sheet-header .title i {
            color: var(--danger);
            font-size: 0.9rem;
        }
        .duplicate-sheet .sheet-header .close-btn {
            background: var(--bg-input);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            transition: background-color var(--transition-fast), transform var(--transition-fast);
        }
        .duplicate-sheet .sheet-header .close-btn:active { transform: scale(0.88); }
        .duplicate-sheet .sheet-body {
            padding: 12px 16px 20px;
            max-height: calc(70vh - 60px);
            overflow-y: auto;
            background: var(--bg-card);
        }
        .duplicate-sheet .dup-item-sheet {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }
        .duplicate-sheet .dup-item-sheet .dup-imei {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--danger);
            font-family: 'SF Mono', monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .duplicate-sheet .dup-item-sheet .dup-imei .badge-count {
            background: var(--danger-bg);
            color: var(--danger);
            font-size: 0.5rem;
            font-weight: 700;
            padding: 1px 10px;
            border-radius: 12px;
        }
        .duplicate-sheet .dup-item-sheet .dup-locations {
            margin-top: 6px;
            padding-left: 4px;
        }
        .duplicate-sheet .dup-item-sheet .dup-location {
            display: grid;
            grid-template-columns: 1fr 1.2fr 0.8fr 0.8fr;
            gap: 4px;
            padding: 3px 0;
            font-size: 0.5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
        .duplicate-sheet .dup-item-sheet .dup-location:last-child {
            border-bottom: none;
        }
        .duplicate-sheet .dup-item-sheet .dup-location .header-label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.45rem;
            text-transform: uppercase;
        }
        .duplicate-sheet .dup-item-sheet .dup-location .status-badge {
            font-size: 0.4rem;
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 700;
        }
        .duplicate-sheet .dup-item-sheet .dup-location .status-badge.stock {
            background: var(--warning-bg);
            color: var(--warning);
        }
        .duplicate-sheet .dup-item-sheet .dup-location .status-badge.sold {
            background: var(--success-bg);
            color: var(--success);
        }
        .duplicate-sheet .dup-empty {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        .duplicate-sheet .dup-empty i {
            font-size: 1.8rem;
            opacity: 0.3;
            display: block;
            margin-bottom: 8px;
        }

        .duplicate-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 9998;
            opacity: 0;
            transition: opacity var(--transition-normal);
            pointer-events: none;
        }
        .duplicate-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        [data-theme="dark"] .duplicate-sheet {
            background: var(--bg-card-solid);
            border-top-color: var(--border-color);
        }
        [data-theme="dark"] .duplicate-sheet .dup-item-sheet {
            background: var(--bg-secondary);
            border-color: var(--border-color);
        }
        [data-theme="dark"] .duplicate-sheet .dup-item-sheet .dup-location {
            border-bottom-color: rgba(255,255,255,0.03);
        }

        /* ============================================================
           TOAST SNACKBAR - SINGLE ELEMENT
           ============================================================ */
        #appToast {
            position: fixed;
            bottom: 90px;
            left: 16px;
            right: 16px;
            background: var(--bg-card-solid);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            font-size: 12px;
            font-weight: 500;
            z-index: 10000;
            border: 1px solid var(--border-color);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity var(--transition-normal), transform var(--transition-normal);
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        #appToast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        #appToast.hiding {
            opacity: 0;
            transform: translateY(20px);
        }
        #appToast .toast-icon { flex-shrink: 0; font-size: 1rem; }
        #appToast .toast-icon.success { color: var(--success); }
        #appToast .toast-icon.error { color: var(--danger); }
        #appToast .toast-icon.warning { color: var(--warning); }
        #appToast .toast-icon.info { color: var(--primary); }
        #appToast .toast-content { flex: 1; }
        #appToast .toast-title {
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-primary);
        }
        #appToast .toast-message {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 1px;
        }
        #appToast .toast-close {
            background: var(--bg-input);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.6rem;
            cursor: pointer;
            pointer-events: auto;
            flex-shrink: 0;
            transition: background-color var(--transition-fast), transform var(--transition-fast);
        }
        #appToast .toast-close:active { transform: scale(0.85); }

        [data-theme="dark"] #appToast {
            background: var(--bg-card-solid);
            border-color: var(--border-color);
        }
        [data-theme="dark"] #appToast .toast-close {
            background: var(--bg-secondary);
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 480px) {
            .navbar-app .brand .title { font-size: 0.75rem; }
            .navbar-app .brand .icon { width: 30px; height: 30px; font-size: 0.85rem; }
            .kpi-sticky-wrapper .kpi-mini { padding: 6px 10px; min-width: 64px; }
            .kpi-sticky-wrapper .kpi-mini .value { font-size: 0.8rem; }
            .customer-card .main { padding: 10px 12px; }
            .customer-card .main .left .name { font-size: 0.75rem; }
            .customer-card .main .stats .stat .num { font-size: 0.7rem; }
            .customer-card .main .stats { gap: 6px; }
            .bottom-nav .nav-item { font-size: 0.4rem; padding: 2px 8px; }
            .bottom-nav .nav-item i { font-size: 1rem; }
            .fab-refresh { width: 44px; height: 44px; font-size: 1rem; bottom: 72px; right: 12px; }
            .search-bar { padding: 8px 12px; }
            .search-bar input { font-size: 0.7rem; }
            .main-content { padding: 0 8px 8px; }
            .chip { font-size: 0.5rem; padding: 3px 10px; }
            .worst-item .name { font-size: 0.5rem; }
            .modal-dialog { margin: 8px; }
            .duplicate-sheet { max-height: 75vh; }
            .duplicate-sheet .sheet-body { max-height: calc(75vh - 60px); padding: 10px 12px 16px; }
            .duplicate-sheet .dup-item-sheet .dup-location {
                grid-template-columns: 0.8fr 1fr 0.7fr 0.7fr;
                font-size: 0.45rem;
                gap: 2px;
            }
        }
        @media (max-width: 380px) {
            .kpi-sticky-wrapper .kpi-mini { padding: 4px 8px; min-width: 54px; }
            .kpi-sticky-wrapper .kpi-mini .value { font-size: 0.7rem; }
            .kpi-sticky-wrapper .kpi-mini .label { font-size: 0.4rem; }
            .customer-card .main .left .name { font-size: 0.65rem; }
            .customer-card .main .stats .stat .num { font-size: 0.6rem; }
        }
        @media (min-width: 601px) {
            .main-content { max-width: 640px; }
            .kpi-sticky-wrapper .kpi-mini { min-width: 100px; }
            .kpi-sticky-wrapper .kpi-mini .value { font-size: 1.1rem; }
        }
        @media (max-height: 500px) and (orientation: landscape) {
            .kpi-sticky-wrapper { top: 48px; padding: 4px 8px; }
            .kpi-sticky-wrapper .kpi-mini { padding: 4px 8px; min-width: 56px; }
            .kpi-sticky-wrapper .kpi-mini .value { font-size: 0.7rem; }
            .customer-card .main { padding: 6px 10px; }
            .customer-card .main .left .name { font-size: 0.65rem; }
            .customer-card .body-collapse .inner { padding: 2px 10px 6px; }
            .bottom-nav { padding: 2px 0; }
            .bottom-nav .nav-item { padding: 2px 6px; }
            .bottom-nav .nav-item i { font-size: 0.9rem; }
            .fab-refresh { width: 36px; height: 36px; font-size: 0.8rem; bottom: 56px; right: 10px; }
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="loader-wrapper">
            <div class="loader-icon">
                <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="20" width="10" height="30" rx="2" class="fill-primary">
                        <animate attributeName="height" values="30;40;30" dur="0.8s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="25" y="12" width="10" height="38" rx="2" class="fill-secondary">
                        <animate attributeName="height" values="38;48;38" dur="0.8s" repeatCount="indefinite" begin="0.15s"/>
                    </rect>
                    <rect x="40" y="18" width="10" height="32" rx="2" class="fill-primary">
                        <animate attributeName="height" values="32;42;32" dur="0.8s" repeatCount="indefinite" begin="0.3s"/>
                    </rect>
                </svg>
            </div>
            <div class="loader-title">Apple Coverage</div>
            <div class="loader-subtitle">Mobile Channel Inventory Monitoring</div>
            <div class="loader-progress">
                <div class="loader-progress-bar" id="progressBar"></div>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar-app">
        <a class="brand" href="#">
            <div class="icon"><i class="fab fa-apple"></i></div>
            <div>
                <span class="title">Coverage</span>
                <span class="subtitle"><i class="fas fa-circle" style="color:#2b8c5e;font-size:0.25rem;"></i> Mobile</span>
            </div>
        </a>
        <div class="navbar-actions">
            <span class="sync-badge"><i class="far fa-clock"></i> <span id="syncTime">-</span></span>
            <button class="btn-icon" onclick="toggleDarkMode()" title="Mode Malam" aria-label="Toggle Dark Mode">
                <i class="fas fa-moon" id="darkIcon"></i>
            </button>
        </div>
    </nav>

    <!-- STICKY KPI -->
    <div class="kpi-sticky-wrapper">
        <div class="kpi-scroll">
            <div class="kpi-mini">
                <div class="label"><i class="fas fa-chart-line me-1"></i>Sell Thru</div>
                <div class="value" id="kpiSellThru">0</div>
            </div>

    <script>
        // ============================================================

        // ============================================================

        // ============================================================

        // ============================================================
        // SECURITY HELPERS
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            var map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function escapeJsString(str) {
            if (!str) return '';
            return String(str)
                .replace(/\\/g, '\\\\')
                .replace(/"/g, '\\"')
                .replace(/'/g, "\\'")
                .replace(/\n/g, '\\n')
                .replace(/\r/g, '\\r');
        }

        function safeAttr(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function safeText(value) {
            if (value === undefined || value === null) return '-';
            return escapeHtml(String(value));
        }

        // ============================================================
        // TOAST SNACKBAR - SINGLE ELEMENT
        // ============================================================
        var toastTimeout = null;
        var toastElement = null;

        function getToastElement() {
            if (!toastElement) {
                toastElement = document.getElementById('appToast');
            }
            return toastElement;
        }

        function showToast(message, type, duration) {
            type = type || 'info';
            duration = duration || 3000;

            var toast = getToastElement();
            if (!toast) return;

            var icons = {
                success: 'fa-regular fa-circle-check',
                error: 'fa-regular fa-circle-xmark',
                warning: 'fa-regular fa-triangle-exclamation',
                info: 'fa-regular fa-circle-info'
            };

            var titles = {
                success: 'Sukses',
                error: 'Error',
                warning: 'Peringatan',
                info: 'Informasi'
            };

            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toastTimeout = null;
            }

            toast.classList.remove('show', 'hiding');

            var icon = toast.querySelector('.toast-icon');
            var title = toast.querySelector('.toast-title');
            var msg = toast.querySelector('.toast-message');

            if (icon) {
                icon.className = 'toast-icon ' + type;
                icon.innerHTML = '<i class="' + (icons[type] || icons.info) + '"></i>';
            }
            if (title) title.textContent = titles[type] || 'Info';
            if (msg) msg.textContent = message;

            void toast.offsetWidth;

            toast.classList.add('show');

            toastTimeout = setTimeout(function() {
                toast.classList.remove('show');
                toast.classList.add('hiding');
                setTimeout(function() {
                    toast.classList.remove('hiding');
                }, 300);
            }, duration);
        }

        function hideToast() {
            var toast = getToastElement();
            if (!toast) return;
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toastTimeout = null;
            }
            toast.classList.remove('show');
            toast.classList.add('hiding');
            setTimeout(function() {
                toast.classList.remove('hiding');
            }, 300);
        }

        // ============================================================
        // LOADING
        // ============================================================
        function updateProgress(percent) {
            var progressBar = document.getElementById('progressBar');
            if (progressBar) progressBar.style.width = Math.min(percent, 100) + '%';
        }

        function hideLoadingScreen() {
            var loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) loadingScreen.classList.add('hidden');
        }

        // ============================================================
        // DARK MODE
        // ============================================================
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            var icon = document.getElementById('darkIcon');
            icon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('darkMode', isDarkMode ? 'true' : 'false');
        }

        function detectSystemTheme() {
            var saved = localStorage.getItem('darkMode');
            if (saved !== null) {
                isDarkMode = saved === 'true';
            } else {
                isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            document.getElementById('darkIcon').className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
        }

        // ============================================================
        // PULL TO REFRESH
        // ============================================================
        var pullStartY = 0;
        var isPulling = false;

        document.addEventListener('touchstart', function(e) {
            if (window.scrollY === 0) {
                pullStartY = e.touches[0].clientY;
                isPulling = true;
            }
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            if (isPulling && window.scrollY === 0) {
                var deltaY = e.touches[0].clientY - pullStartY;
                if (deltaY > 60) {
                    isPulling = false;
                    fetchData();
                }
            }
        }, { passive: true });

        // ============================================================
        // BOTTOM NAVIGATION
        // ============================================================

        // ============================================================
        // SEARCH
        // ============================================================
        function handleSearch() {
            var input = document.getElementById('searchInput');

            document.getElementById('clearBtn').classList.toggle('show', searchQuery.length > 0);

        }

        // ============================================================
        // CHIPS FILTER
        // ============================================================
        function filterChip(el, depo) {
            document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
            el.classList.add('active');
            selectedChip = depo;
            applyAllFilters();
        }

        function setupChips(depos) {
            var container = document.getElementById('chipsContainer');
            container.innerHTML = '<span class="chip active" data-depo="" onclick="filterChip(this, \'\')">All</span>';
            var uniqueDepos = [];
