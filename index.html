<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Coverage Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .loading-container {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 36px 40px 36px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.10);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .loading-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #007aff, #00c6ff, #007aff);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        @media (prefers-reduced-motion: reduce) {
            .loading-container::before {
                animation: none;
                background: linear-gradient(90deg, #007aff, #00c6ff, #007aff);
            }
            .spinner {
                animation: none;
                border-top-color: #007aff;
                border-right-color: #007aff;
                border-bottom-color: #007aff;
                border-left-color: #007aff;
                border: 3px solid #007aff;
                opacity: 0.5;
            }
            @keyframes shimmer {
                0%, 100% { background-position: 0 0; }
            }
            @keyframes spin {
                to { transform: rotate(0deg); }
            }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .logo {
            font-size: 56px;
            color: #007aff;
            margin-bottom: 12px;
        }

        .app-name {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .app-sub {
            font-size: 13px;
            color: #8293a6;
            font-weight: 500;
            margin-bottom: 28px;
        }

        .spinner-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e9ecef;
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner-text {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
        }

        .device-info {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
            padding: 12px 0;
            border-top: 1px solid #eef2f6;
            border-bottom: 1px solid #eef2f6;
        }

        .device-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #475569;
        }

        .device-item i {
            font-size: 14px;
            color: #8293a6;
        }

        .device-item .badge-device {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-device.desktop {
            background: #e8f0fe;
            color: #1a73e8;
        }

        .badge-device.mobile {
            background: #fce8e6;
            color: #d93025;
        }

        .badge-device.tablet {
            background: #e6f4ea;
            color: #1e8e3e;
        }

        .redirect-info {
            font-size: 12px;
            color: #8293a6;
            margin-top: 8px;
        }

        .redirect-info i {
            margin-right: 4px;
        }

        .redirect-info a {
            color: #007aff;
            text-decoration: none;
            font-weight: 600;
        }

        .redirect-info a:hover {
            text-decoration: underline;
        }

        .manual-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-manual {
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #475569;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-manual:hover {
            border-color: #007aff;
            background: #e8f0fe;
            color: #007aff;
        }

        .btn-manual.primary {
            background: #007aff;
            border-color: #007aff;
            color: #fff;
        }

        .btn-manual.primary:hover {
            background: #0066d6;
            border-color: #0066d6;
        }

        .error-message {
            display: none;
            margin-top: 12px;
            padding: 10px 14px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            font-size: 12px;
            color: #dc2626;
            font-weight: 500;
        }

        .error-message.show {
            display: block;
        }

        .error-message i {
            margin-right: 6px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0f172a 0%, #1a2332 100%);
            }
            .loading-container {
                background: #1e293b;
                box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
            }
            .app-name {
                color: #f8fafc;
            }
            .app-sub {
                color: #94a3b8;
            }
            .spinner-text {
                color: #cbd5e1;
            }
            .device-info {
                border-color: #334155;
            }
            .device-item {
                color: #cbd5e1;
            }
            .device-item i {
                color: #94a3b8;
            }
            .redirect-info {
                color: #94a3b8;
            }
            .btn-manual {
                background: #1e293b;
                border-color: #334155;
                color: #cbd5e1;
            }
            .btn-manual:hover {
                border-color: #007aff;
                background: #1a2a3a;
                color: #60a5fa;
            }
            .btn-manual.primary {
                background: #007aff;
                border-color: #007aff;
                color: #fff;
            }
            .btn-manual.primary:hover {
                background: #0066d6;
                border-color: #0066d6;
            }
            .badge-device.desktop {
                background: #1a2a3a;
                color: #60a5fa;
            }
            .badge-device.mobile {
                background: #3a1a1a;
                color: #f87171;
            }
            .badge-device.tablet {
                background: #1a3a2a;
                color: #34a853;
            }
            .error-message {
                background: #3a1a1a;
                border-color: #7f1d1d;
                color: #f87171;
            }
        }

        @media (max-width: 480px) {
            .loading-container {
                padding: 32px 20px 28px 20px;
                border-radius: 16px;
            }
            .logo {
                font-size: 44px;
            }
            .app-name {
                font-size: 18px;
            }
            .device-info {
                flex-direction: column;
                gap: 8px;
                padding: 10px 0;
            }
            .device-item {
                justify-content: center;
            }
            .manual-buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn-manual {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="loading-container" id="loadingContainer" role="main" aria-label="Loading and device detection">
        <div class="logo" aria-hidden="true">
            <i class="fa-brands fa-apple"></i>
        </div>
        <div class="app-name">Apple Coverage Monitoring</div>
        <div class="app-sub">Mendeteksi perangkat Anda...</div>

        <div class="spinner-wrapper" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <span class="spinner-text" id="statusText">Memeriksa perangkat...</span>
        </div>

        <div class="device-info" role="group" aria-label="Device detection status">
            <div class="device-item">
                <i class="fa-solid fa-desktop" aria-hidden="true"></i>
                <span>Desktop</span>
                <span class="badge-device desktop" id="desktopBadge">○</span>
            </div>
            <div class="device-item">
                <i class="fa-solid fa-tablet-screen-button" aria-hidden="true"></i>
                <span>Tablet</span>
                <span class="badge-device tablet" id="tabletBadge">○</span>
            </div>
            <div class="device-item">
                <i class="fa-solid fa-mobile-screen-button" aria-hidden="true"></i>
                <span>Mobile</span>
                <span class="badge-device mobile" id="mobileBadge">○</span>
            </div>
        </div>

        <div class="redirect-info" id="redirectInfo" aria-live="polite">
            <i class="fa-regular fa-arrow-right" aria-hidden="true"></i>
            Mengarahkan ke <span id="targetPage">Dashboard</span>...
        </div>

        <div class="error-message" id="errorMessage" role="alert">
            <i class="fa-regular fa-circle-exclamation" aria-hidden="true"></i>
            Redirect gagal. Silakan klik tombol di bawah.
        </div>

        <div class="manual-buttons">
            <a href="Dashboard.html" class="btn-manual primary" id="btnDesktop" role="button" aria-label="Buka versi Desktop Dashboard" title="Buka Dashboard untuk Desktop">
                <i class="fa-solid fa-desktop" aria-hidden="true"></i> Desktop View
            </a>
            <a href="mobile.html" class="btn-manual" id="btnMobile" role="button" aria-label="Buka versi Mobile" title="Buka Mobile View">
                <i class="fa-solid fa-mobile-screen-button" aria-hidden="true"></i> Mobile View
            </a>
        </div>
    </div>

    <script>
        var elements = {
            desktopBadge: document.getElementById('desktopBadge'),
            tabletBadge: document.getElementById('tabletBadge'),
            mobileBadge: document.getElementById('mobileBadge'),
            statusText: document.getElementById('statusText'),
            targetPage: document.getElementById('targetPage'),
            redirectInfo: document.getElementById('redirectInfo'),
            errorMessage: document.getElementById('errorMessage'),
            loadingContainer: document.getElementById('loadingContainer')
        };

        function detectDevice() {
            var ua = navigator.userAgent || navigator.vendor || window.opera || '';

            var isMobile = /Android|iPhone|iPod|BlackBerry|Opera Mini|IEMobile|WPDesktop|Mobile|webOS/i.test(ua);
            var isTablet = /iPad|Android(?!.*Mobile)|Kindle|Silk/i.test(ua);

            if (isTablet) {
                isMobile = false;
            }

            if (/Mobile/i.test(ua)) {
                isMobile = true;
                isTablet = false;
            }

            var deviceType = 'desktop';

            if (isTablet) {
                deviceType = 'tablet';
            } else if (isMobile) {
                deviceType = 'mobile';
            }

            return {
                type: deviceType,
                isMobile: deviceType === 'mobile',
                isDesktop: deviceType === 'desktop',
                isTablet: deviceType === 'tablet',
                userAgent: ua,
                screenWidth: window.innerWidth
            };
        }

        function updateUI(device) {
            var desktopBadge = elements.desktopBadge;
            var tabletBadge = elements.tabletBadge;
            var mobileBadge = elements.mobileBadge;
            var statusText = elements.statusText;
            var targetPage = elements.targetPage;

            desktopBadge.textContent = '○';
            tabletBadge.textContent = '○';
            mobileBadge.textContent = '○';

            if (device.type === 'desktop') {
                desktopBadge.textContent = '✓';
                statusText.textContent = 'Desktop terdeteksi ✓';
                targetPage.textContent = 'Dashboard (Desktop)';
            } else if (device.type === 'tablet') {
                tabletBadge.textContent = '✓';
                statusText.textContent = 'Tablet terdeteksi ✓';
                targetPage.textContent = 'Dashboard (Tablet)';
            } else {
                mobileBadge.textContent = '✓';
                statusText.textContent = 'Mobile terdeteksi ✓';
                targetPage.textContent = 'Mobile View';
            }
        }

        function showError() {
            var errorMessage = elements.errorMessage;
            var statusText = elements.statusText;
            var redirectInfo = elements.redirectInfo;

            errorMessage.classList.add('show');
            statusText.textContent = '⏳ Redirect gagal';
            redirectInfo.innerHTML = '<i class="fa-regular fa-circle-exclamation" aria-hidden="true"></i> Gunakan tombol di bawah untuk memilih tampilan.';
        }

        function redirectToAppropriatePage(device) {
            var targetUrl = '';
            var delay = 600;

            if (device.type === 'desktop' || device.type === 'tablet') {
                targetUrl = 'Dashboard.html';
            } else {
                targetUrl = 'mobile.html';
            }

            var statusText = elements.statusText;
            var redirectInfo = elements.redirectInfo;

            statusText.textContent = 'Mengarahkan ke ' + targetUrl + '...';
            redirectInfo.innerHTML = '<i class="fa-regular fa-arrow-right" aria-hidden="true"></i> Mengarahkan ke <strong>' + targetUrl + '</strong>...';

            setTimeout(function() {
                try {
                    window.location.replace(targetUrl);
                } catch (e) {
                    showError();
                }
            }, delay);
        }

        function isOnCorrectPage(device) {
            var currentPath = window.location.pathname;
            var currentFile = currentPath.split('/').pop() || 'index.html';

            if (device.type === 'desktop' || device.type === 'tablet') {
                if (currentFile === 'mobile.html') {
                    return false;
                }
                if (currentFile === 'index.html' || currentFile === '') {
                    return false;
                }
                return true;
            } else {
                if (currentFile === 'Dashboard.html' || currentFile === 'index.html' || currentFile === '') {
                    return false;
                }
                return true;
            }
        }

        (function main() {
            try {
                var device = detectDevice();
                updateUI(device);

                if (isOnCorrectPage(device)) {
                    var statusText = elements.statusText;
                    var redirectInfo = elements.redirectInfo;
                    statusText.textContent = 'Sudah di halaman yang benar ✓';
                    redirectInfo.innerHTML = '<i class="fa-regular fa-circle-check" style="color: #28a745;" aria-hidden="true"></i> Anda sudah berada di halaman yang tepat.';
                    return;
                }

                redirectToAppropriatePage(device);
            } catch (e) {
                showError();
            }
        })();

        var resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                try {
                    var device = detectDevice();
                    var currentPath = window.location.pathname;
                    var currentFile = currentPath.split('/').pop() || 'index.html';

                    var shouldRedirect = false;
                    if ((device.type === 'desktop' || device.type === 'tablet') && currentFile === 'mobile.html') {
                        shouldRedirect = true;
                    } else if (device.type === 'mobile' && (currentFile === 'Dashboard.html' || currentFile === 'index.html')) {
                        shouldRedirect = true;
                    }

                    if (shouldRedirect) {
                        redirectToAppropriatePage(device);
                    }
                } catch (e) {
                    showError();
                }
            }, 500);
        });

        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                try {
                    var device = detectDevice();
                    var currentPath = window.location.pathname;
                    var currentFile = currentPath.split('/').pop() || 'index.html';

                    if (device.type === 'mobile' && currentFile === 'Dashboard.html') {
                        redirectToAppropriatePage(device);
                    } else if ((device.type === 'desktop' || device.type === 'tablet') && currentFile === 'mobile.html') {
                        redirectToAppropriatePage(device);
                    }
                } catch (e) {
                    showError();
                }
            }, 600);
        });

        setTimeout(function() {
            var currentPath = window.location.pathname;
            var currentFile = currentPath.split('/').pop() || 'index.html';
            if (currentFile === 'index.html' || currentFile === '') {
                showError();
            }
        }, 5000);
    </script>

</body>
</html>
